# Tjenestesidens prosess-tidslinje
process_section_tag: Vår prosess
process_section_title: Slik fungerer et havneanløp med oss
process_step_1_title: Før ankomst
process_step_1_body: Vi bekrefter kaiplass, forhåndsklarerer tolldokumenter og koordinerer los og slepebåter før fartøyet kommer.
process_step_2_title: Ankomst
process_step_2_body: Fortøyningsmannskap, immigrasjon og toll koordineres på kaia. Agenten din er tilgjengelig døgnet rundt fra ankomstøyeblikket.
process_step_3_title: Havneopphold
process_step_3_body: Forsyninger, bunkers, mannskapsbytter, avfallshåndtering og tekniske besøk — vi tar hånd om logistikken slik at fartøyet holder rute.
process_step_4_title: Avgang
process_step_4_body: Sluttoll, losbestilling og en sluttrapport med faktagrunnlag levert sammen med disbursement-regnskapet.

