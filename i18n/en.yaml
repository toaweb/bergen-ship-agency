# Service-page process timeline
process_section_tag: Our process
process_section_title: How a port call works with us
process_step_1_title: Pre-arrival
process_step_1_body: We confirm the berth, pre-clear customs paperwork, and coordinate pilotage and tugs before your vessel arrives.
process_step_2_title: Arrival
process_step_2_body: Mooring crew, immigration, and customs are coordinated on the quay. Your agent is reachable around the clock from the moment you arrive.
process_step_3_title: Port stay
process_step_3_body: Supplies, bunkering, crew transfers, waste reception, technical visits — we handle the logistics so the vessel keeps to schedule.
process_step_4_title: Departure
process_step_4_body: Final customs, pilot booking, and a post-call statement of facts delivered with the disbursement account.

