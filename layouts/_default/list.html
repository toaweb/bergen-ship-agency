{{ define "main" }}
<section class="page-hero">
  <div class="container">
    <div class="page-hero-content">
      <div class="section-tag">{{ i18n "tag_what_we_do" }}</div>
      <h1>{{ .Title }}</h1>
      {{ with .Description }}<p>{{ . }}</p>{{ else }}{{ if eq .Section "services" }}<p>{{ i18n "services_listing_subtitle" }}</p>{{ end }}{{ end }}
    </div>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="services-grid">
      {{ range .Pages.ByWeight }}
        {{ partial "service-card.html" . }}
      {{ end }}
    </div>
  </div>
</section>
{{ end }}
