{{- /*
  Inline SVG flag for the language switcher. Pass a language code:
    en → Union Jack (UK)
    nb → Norwegian flag
*/ -}}
{{- $lang := . -}}
{{- if eq $lang "en" -}}
<svg class="flag flag-en" viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <clipPath id="flagEnClip"><path d="M0,0 v30 h60 v-30 z"/></clipPath>
  <clipPath id="flagEnClip2"><path d="M30,15 h30 v15 z v15 h-30 z h-30 v-15 z v-15 h30 z"/></clipPath>
  <g clip-path="url(#flagEnClip)">
    <path d="M0,0 v30 h60 v-30 z" fill="#012169"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#fff" stroke-width="6"/>
    <path d="M0,0 L60,30 M60,0 L0,30" stroke="#C8102E" stroke-width="4" clip-path="url(#flagEnClip2)"/>
    <path d="M30,0 v30 M0,15 h60" stroke="#fff" stroke-width="10"/>
    <path d="M30,0 v30 M0,15 h60" stroke="#C8102E" stroke-width="6"/>
  </g>
</svg>
{{- else if eq $lang "nb" -}}
<svg class="flag flag-nb" viewBox="0 0 22 16" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <rect width="22" height="16" fill="#BA0C2F"/>
  <rect y="6" width="22" height="4" fill="#fff"/>
  <rect x="6" width="4" height="16" fill="#fff"/>
  <rect y="7" width="22" height="2" fill="#00205B"/>
  <rect x="7" width="2" height="16" fill="#00205B"/>
</svg>
{{- end -}}
