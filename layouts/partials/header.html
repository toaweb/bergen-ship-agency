<header class="site-header">
  <div class="topbar">
    <div class="container">
      <a href="tel:{{ .Site.Params.phone }}" class="topbar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2.25 6.75c0 8.284 6.716 15 15 15h2.25a2.25 2.25 0 002.25-2.25v-1.372c0-.516-.351-.966-.852-1.091l-4.423-1.106c-.44-.11-.902.055-1.173.417l-.97 1.293c-.282.376-.769.542-1.21.38a12.035 12.035 0 01-7.143-7.143c-.162-.441.004-.928.38-1.21l1.293-.97c.363-.271.527-.734.417-1.173L6.963 3.102a1.125 1.125 0 00-1.091-.852H4.5A2.25 2.25 0 002.25 4.5v2.25z"/></svg>
        {{ .Site.Params.phone }}
      </a>
      <a href="mailto:{{ .Site.Params.email }}" class="topbar-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/></svg>
        {{ .Site.Params.email }}
      </a>
    </div>
  </div>

  <nav class="navbar" id="navbar">
    <div class="container nav-inner">
      <a href="/" class="nav-logo">
        <span class="logo-text">Bergen Ship Agency</span>
      </a>

      <button class="nav-toggle" id="navToggle" aria-label="Toggle menu" aria-expanded="false" aria-controls="navMenu">
        <span></span><span></span><span></span>
      </button>

      <ul class="nav-menu" id="navMenu">
        <li><a href="/" class="{{ if .IsHome }}active{{ end }}">Home</a></li>
        <li><a href="/about-us/" class="{{ if eq .RelPermalink "/about-us/" }}active{{ end }}">About Us</a></li>
        <li class="has-dropdown">
          <a href="/services/" class="{{ if hasPrefix .RelPermalink "/services/" }}active{{ end }}">
            Services
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 9l-7 7-7-7"/></svg>
          </a>
          <ul class="dropdown">
            {{- range (site.GetPage "/services").Pages.ByWeight }}
            <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
            {{- end }}
          </ul>
        </li>
        <li><a href="/contact/" class="{{ if eq .RelPermalink "/contact/" }}active{{ end }}">Contact Us</a></li>
      </ul>
    </div>
  </nav>
</header>
